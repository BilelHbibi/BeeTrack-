<div class="bg-white rounded-2xl p-6 w-full max-w-md">
    <h2 class="text-2xl font-bold mb-4">Ajouter une récolte</h2>

    <form [formGroup]="recolteForm" (ngSubmit)="submit()">
        <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1">Date</label>
            <input type="date" formControlName="date" class="w-full border rounded-lg px-3 py-2" />
        </div>

        <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1">Type de miel</label>
            <input type="text" formControlName="typeMiel" class="w-full border rounded-lg px-3 py-2" />
        </div>

        <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1">Quantité (kg)</label>
            <input type="number" formControlName="quantite" class="w-full border rounded-lg px-3 py-2" />
        </div>

        <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1">Observation</label>
            <textarea formControlName="observation" rows="3" class="w-full border rounded-lg px-3 py-2"></textarea>
        </div>

        <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1">Rucher</label>
            <select formControlName="rucherId" class="w-full border rounded-lg px-3 py-2">
                <option value="" disabled>-- Sélectionner un rucher --</option>
                <option *ngFor="let rucher of ruchers" [value]="rucher.id">{{ rucher.nom }}</option>
            </select>
        </div>

        <div class="flex justify-end space-x-2 mt-6">
            <button type="button" (click)="close()" class="px-4 py-2 rounded-lg border border-gray-300 hover:bg-gray-100">
                Annuler
            </button>
            <button type="submit" class="px-4 py-2 rounded-lg bg-green-600 text-white hover:bg-green-700">
                Ajouter
            </button>
        </div>
    </form>
</div>
