<h2 mat-dialog-title>Ajouter une Ruche</h2>

<form [formGroup]="rucheForm" (ngSubmit)="onSubmit()">
    <!-- Code -->
    <mat-form-field appearance="outline" class="w-full">
        <mat-label>Code</mat-label>
        <input matInput formControlName="code" required />
        <mat-error *ngIf="rucheForm.controls['code'].hasError('required')">
            Le code est obligatoire
        </mat-error>
    </mat-form-field>

    <!-- Type -->
    <mat-form-field appearance="outline" class="w-full">
        <mat-label>Type</mat-label>
        <mat-select formControlName="type">
            <mat-option value="Dadant">Dadant</mat-option>
            <mat-option value="Langstroth">Langstroth</mat-option>
            <mat-option value="Warré">Warré</mat-option>
        </mat-select>
    </mat-form-field>

    <!-- État -->
    <mat-form-field appearance="outline" class="w-full">
        <mat-label>État</mat-label>
        <mat-select formControlName="etat">
            <mat-option value="Active">Active</mat-option>
            <mat-option value="En Pause">En Pause</mat-option>
            <mat-option value="Malade">Malade</mat-option>
        </mat-select>
    </mat-form-field>

    <!-- Rucher -->
    <mat-form-field appearance="outline" class="w-full">
        <mat-label>Rucher</mat-label>
        <mat-select formControlName="rucherId" required>
            <mat-option *ngFor="let rucher of ruchers" [value]="rucher.id">
                {{ rucher.nom }} ({{ rucher.localisation }})
            </mat-option>
        </mat-select>
    </mat-form-field>

    <div class="flex justify-end space-x-2 mt-4">
        <button mat-button type="button" (click)="onCancel()">Annuler</button>
        <button mat-flat-button color="primary" type="submit" [disabled]="rucheForm.invalid">
            Ajouter
        </button>
    </div>
</form>
