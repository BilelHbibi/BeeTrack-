<h2 mat-dialog-title>Modifier une Ruche</h2>

<form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-4 p-4">
    <mat-form-field class="w-full">
        <mat-label>Code</mat-label>
        <input matInput formControlName="code" required />
    </mat-form-field>

    <mat-form-field class="w-full">
        <mat-label>Type</mat-label>
        <input matInput formControlName="type" />
    </mat-form-field>

    <mat-form-field class="w-full">
        <mat-label>État</mat-label>
        <input matInput formControlName="etat" />
    </mat-form-field>

    <mat-form-field class="w-full">
        <mat-label>Rucher</mat-label>
        <mat-select formControlName="rucherId" required>
            <mat-option *ngFor="let rucher of ruchers" [value]="rucher.id">
                {{ rucher.nom }}
            </mat-option>
        </mat-select>
    </mat-form-field>

    <div class="flex justify-end gap-2 mt-4">
        <button mat-button type="button" (click)="onCancel()">Annuler</button>
        <button mat-raised-button color="primary" type="submit">Mettre à jour</button>
    </div>
</form>
