<!-- ajout-depense-dialog.component.html -->
<h2 mat-dialog-title>Ajouter une dépense</h2>
<form [formGroup]="form" (ngSubmit)="onSubmit()" class="p-4 space-y-4">
    <mat-form-field class="w-full">
        <mat-label>Catégorie</mat-label>
        <input matInput formControlName="categorie">
    </mat-form-field>
    <mat-form-field class="w-full">
        <mat-label>Montant</mat-label>
        <input matInput type="number" formControlName="montant">
    </mat-form-field>
    <mat-form-field class="w-full">
        <mat-label>Date</mat-label>
        <input matInput [matDatepicker]="picker" formControlName="date">
        <mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>
        <mat-datepicker #picker></mat-datepicker>
    </mat-form-field>
    <div class="flex justify-end space-x-2">
        <button mat-button type="button" (click)="onCancel()">Annuler</button>
        <button mat-raised-button color="primary" type="submit">Ajouter</button>
    </div>
</form>
