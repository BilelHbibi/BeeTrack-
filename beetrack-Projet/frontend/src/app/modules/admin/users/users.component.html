<div class="sm:absolute sm:inset-0 flex flex-col flex-auto min-w-0 sm:overflow-hidden">
    <!-- Header -->
    <div
        class="relative flex flex-col sm:flex-row flex-0 sm:items-center sm:justify-between py-8 px-6 md:px-8 border-b border-gray-200">
        <!-- Title -->
        <div class="text-4xl font-extrabold tracking-tight text-gray-800">Utilisateurs</div>
        <!-- Add user button -->
        <div class="flex shrink-0 items-center mt-6 sm:mt-0 sm:ml-4">
            <button (click)="openDialog()"
                    class="ml-4 bg-gradient-to-r from-green-600 to-emerald-600 hover:from-green-700 hover:to-emerald-700 text-white px-4 py-2 rounded-lg transition flex items-center space-x-2 shadow-md hover:shadow-lg">
                <i class="fas fa-plus"></i>
                <span class="ml-2 mr-1">Ajouter</span>
            </button>
        </div>
    </div>

    <!-- Main Content -->
    <div class="flex-1 overflow-y-auto p-6">
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-gray-200">
                    <!-- Table Header -->
                    <thead class="bg-gray-50">
                    <tr>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Nom</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Prénom</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Email</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Rôle</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Actions</th>
                    </tr>
                    </thead>
                    <!-- Table Body -->
                    <tbody class="bg-white divide-y divide-gray-200">
                    <tr *ngFor="let user of users$" class="hover:bg-gray-50 transition-colors">
                        <td class="px-6 py-4">{{ user.nom }}</td>
                        <td class="px-6 py-4">{{ user.prenom }}</td>
                        <td class="px-6 py-4">{{ user.email }}</td>
                        <td class="px-6 py-4">
                                <span class="px-2 py-1 rounded text-xs font-medium"
                                      [ngClass]="user.role === 'ADMIN' ? 'bg-green-100 text-green-800' : 'bg-blue-100 text-blue-800'">
                                    {{ user.role }}
                                </span>
                        </td>
                        <td class="px-6 py-4 text-right text-sm font-medium">
                            <button class="text-green-600 hover:text-green-900 mr-4"
                                    (click)="openDialogUpdate(user)">Modifier</button>
                            <button class="text-red-600 hover:text-red-900"
                                    (click)="openDialogDelete(user.id)">Supprimer</button>
                        </td>
                    </tr>
                    <!-- Message si vide -->
                    <tr *ngIf="users$?.length === 0">
                        <td colspan="5" class="px-6 py-8 text-center text-gray-500">
                            <div class="text-2xl mb-2">📭</div>
                            <div class="text-lg font-medium">Aucun utilisateur trouvé</div>
                            <p class="mt-1 text-sm">Commencez par ajouter un utilisateur.</p>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
