<h2 mat-dialog-title>Ajouter une Intervention</h2>

<form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-4 p-4">

    <!-- Date -->
    <mat-form-field class="w-full">
        <mat-label>Date</mat-label>
        <input matInput [matDatepicker]="picker" formControlName="date" required>
        <mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>
        <mat-datepicker #picker></mat-datepicker>
    </mat-form-field>

    <!-- Remarque -->
    <mat-form-field class="w-full">
        <mat-label>Remarque</mat-label>
        <input matInput formControlName="remarque" required />
    </mat-form-field>

    <!-- Ruche -->
    <mat-form-field class="w-full">
        <mat-label>Ruche</mat-label>
        <mat-select formControlName="rucheId" required>
            <mat-option *ngFor="let ruche of ruches" [value]="ruche.id">
                {{ ruche.code }} - {{ ruche.type }}
            </mat-option>
        </mat-select>
    </mat-form-field>

    <!-- Actions -->
    <div class="flex justify-end gap-2 mt-4">
        <button mat-button type="button" (click)="onCancel()">Annuler</button>
        <button mat-raised-button color="primary" type="submit">Ajouter</button>
    </div>

</form>
