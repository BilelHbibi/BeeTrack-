<div class="sm:absolute sm:inset-0 flex flex-col flex-auto min-w-0 sm:overflow-hidden">

    <!-- Header -->
    <div class="relative flex flex-col sm:flex-row flex-0 sm:items-center sm:justify-between py-8 px-6 md:px-8 border-b border-gray-200">
        <!-- Title -->
        <div class="text-4xl font-extrabold tracking-tight text-gray-800">Inspections</div>
        <!-- Add inspection button -->
        <div class="flex shrink-0 items-center mt-6 sm:mt-0 sm:ml-4">
            <button (click)="openDialog()"
                    class="ml-4 bg-gradient-to-r from-green-600 to-emerald-600 hover:from-green-700 hover:to-emerald-700 text-white px-4 py-2 rounded-lg transition flex items-center space-x-2 shadow-md hover:shadow-lg">
                <i class="fas fa-plus"></i>
                <span class="ml-2 mr-1">Ajouter</span>
            </button>
        </div>
    </div>

    <!-- Main Content -->
    <div class="flex-1 overflow-y-auto p-6">
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-gray-200">
                    <!-- Table Header -->
                    <thead class="bg-gray-50">
                    <tr>
                        <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Date</th>
                        <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Ruche</th>
                        <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Remarque</th>
                        <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Actions</th>
                    </tr>
                    </thead>
                    <!-- Table Body -->
                    <tbody class="bg-white divide-y divide-gray-200">
                    <tr *ngFor="let inspection of inspections$" class="hover:bg-gray-50 transition-colors">
                        <!-- Date -->
                        <td class="px-6 py-4 whitespace-nowrap">
                            <div class="text-sm font-medium text-gray-900">{{ inspection.date | date:'yyyy-MM-dd' }}</div>
                        </td>
                        <!-- Ruche -->
                        <td class="px-6 py-4 whitespace-nowrap">
                            <div class="text-sm text-gray-500">{{ inspection.ruche.code }}</div>
                        </td>
                        <!-- Remarque -->
                        <td class="px-6 py-4 whitespace-nowrap">
                            <div class="text-sm text-gray-500">{{ inspection.remarque }}</div>
                        </td>
                        <!-- Actions -->
                        <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
                            <button class="text-green-600 hover:text-green-900 mr-4" (click)="openDialogUpdate(inspection)">
                                Update
                            </button>
                            <button class="text-blue-600 hover:text-blue-900 mr-4" (click)="openDialogDelete(inspection.id)">
                                Delete
                            </button>
                        </td>
                    </tr>
                    <!-- Message si la liste est vide -->
                    <tr *ngIf="inspections$?.length === 0">
                        <td colspan="4" class="px-6 py-8 text-center text-gray-500">
                            <div class="text-2xl mb-2">📭</div>
                            <div class="text-lg font-medium">Aucune inspection trouvée</div>
                            <p class="mt-1 text-sm">Commencez par ajouter votre première inspection.</p>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <!-- Pagination (statique pour l'instant) -->
            <div class="bg-gray-50 px-6 py-3 flex items-center justify-between border-t border-gray-200">
                <div class="text-sm text-gray-700">
                    Affichage de <span class="font-medium">1</span> à <span class="font-medium">10</span> sur <span class="font-medium">25</span> résultats
                </div>
                <div class="flex items-center space-x-2">
                    <button class="px-3 py-1 text-sm font-medium text-gray-500 bg-white border border-gray-300 rounded-md hover:bg-gray-50">
                        Précédent
                    </button>
                    <button class="px-3 py-1 text-sm font-medium text-white bg-green-600 border border-transparent rounded-md">
                        1
                    </button>
                    <button class="px-3 py-1 text-sm font-medium text-gray-500 bg-white border border-gray-300 rounded-md hover:bg-gray-50">
                        2
                    </button>
                    <button class="px-3 py-1 text-sm font-medium text-gray-500 bg-white border border-gray-300 rounded-md hover:bg-gray-50">
                        3
                    </button>
                    <button class="px-3 py-1 text-sm font-medium text-gray-500 bg-white border border-gray-300 rounded-md hover:bg-gray-50">
                        Suivant
                    </button>
                </div>
            </div>
        </div>
    </div>

</div>
