<div class="p-6 w-96">
    <h2 class="text-xl font-semibold mb-4">Modifier le rucher</h2>

    <form [formGroup]="rucherForm" class="flex flex-col gap-4">
        <mat-form-field appearance="outline">
            <mat-label>Nom</mat-label>
            <input matInput formControlName="nom" />
        </mat-form-field>

        <mat-form-field appearance="outline">
            <mat-label>Localisation</mat-label>
            <input matInput formControlName="localisation" />
        </mat-form-field>

        <div class="flex justify-end gap-2 mt-4">
            <button mat-button (click)="onCancel()">Annuler</button>
            <button mat-flat-button color="primary" (click)="onSave()" [disabled]="rucherForm.invalid">
                Enregistrer
            </button>
        </div>
    </form>
</div>
