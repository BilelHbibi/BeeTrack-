<div class="sm:absolute sm:inset-0 flex flex-col flex-auto min-w-0 sm:overflow-hidden">

    <!-- Header -->
    <div class="relative flex flex-col sm:flex-row flex-0 sm:items-center sm:justify-between py-8 px-6 md:px-8 border-b border-gray-200">
        <div class="text-4xl font-extrabold tracking-tight text-gray-800">Récoltes</div>
        <div class="flex shrink-0 items-center mt-6 sm:mt-0 sm:ml-4">
            <button (click)="openAddDialog()"
                    class="ml-4 bg-gradient-to-r from-green-600 to-emerald-600 hover:from-green-700 hover:to-emerald-700 text-white px-4 py-2 rounded-lg transition flex items-center space-x-2 shadow-md hover:shadow-lg">
                <i class="fas fa-plus"></i>
                <span class="ml-2 mr-1">Ajouter</span>
            </button>
        </div>
    </div>

    <!-- Main Content -->
    <div class="flex-1 overflow-y-auto p-6">
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50">
                    <tr>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Date</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Type de miel</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Quantité (kg)</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Observation</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Rucher</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Actions</th>
                    </tr>
                    </thead>
                    <tbody class="bg-white divide-y divide-gray-200">
                    <tr *ngFor="let recolte of recoltes" class="hover:bg-gray-50 transition-colors">
                        <td class="px-6 py-4 whitespace-nowrap">{{ recolte.date | date }}</td>
                        <td class="px-6 py-4 whitespace-nowrap">{{ recolte.typeMiel }}</td>
                        <td class="px-6 py-4 whitespace-nowrap">{{ recolte.quantite }}</td>
                        <td class="px-6 py-4 whitespace-nowrap">{{ recolte.observation }}</td>
                        <td class="px-6 py-4 whitespace-nowrap">{{ recolte.rucher?.nom }}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
                            <button class="text-green-600 hover:text-green-900 mr-4"
                                    (click)="openUpdateDialog(recolte)">Update</button>
                            <button class="text-blue-600 hover:text-blue-900 mr-4"
                                    (click)="deleteRecolte(recolte.id)">Delete</button>
                        </td>
                    </tr>
                    <tr *ngIf="recoltes?.length === 0">
                        <td colspan="6" class="px-6 py-8 text-center text-gray-500">
                            <div class="text-2xl mb-2">📭</div>
                            <div class="text-lg font-medium">Aucune récolte trouvée</div>
                            <p class="mt-1 text-sm">Commencez par ajouter votre première récolte.</p>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
