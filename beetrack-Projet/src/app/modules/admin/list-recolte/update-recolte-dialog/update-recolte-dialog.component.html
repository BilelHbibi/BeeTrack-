<h2 mat-dialog-title>Modifier une Récolte</h2>

<form [formGroup]="recolteForm" (ngSubmit)="updateRecolte()" class="space-y-4 p-4">

    <mat-form-field class="w-full">
        <mat-label>Date</mat-label>
        <input matInput type="date" formControlName="date" required />
    </mat-form-field>

    <mat-form-field class="w-full">
        <mat-label>Type de miel</mat-label>
        <input matInput formControlName="typeMiel" required />
    </mat-form-field>

    <mat-form-field class="w-full">
        <mat-label>Quantité (kg)</mat-label>
        <input matInput type="number" formControlName="quantite" required />
    </mat-form-field>

    <mat-form-field class="w-full">
        <mat-label>Observation</mat-label>
        <textarea matInput formControlName="observation"></textarea>
    </mat-form-field>

    <mat-form-field class="w-full">
        <mat-label>Rucher</mat-label>
        <mat-select formControlName="rucherId" required>
            <mat-option *ngFor="let rucher of ruchers" [value]="rucher.id">
                {{ rucher.nom }}
            </mat-option>
        </mat-select>
    </mat-form-field>

    <div class="flex justify-end gap-2 mt-4">
        <button mat-button type="button" (click)="closeDialog()">Annuler</button>
        <button mat-raised-button color="primary" type="submit" [disabled]="recolteForm.invalid">Mettre à jour</button>
    </div>

</form>
